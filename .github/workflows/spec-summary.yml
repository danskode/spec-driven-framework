name: Spec Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  pull-requests: write

jobs:
  post-spec-summary:
    name: Post acceptance criteria on PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find spec for this branch
        id: find-spec
        shell: bash
        run: |
          BRANCH="${{ github.head_ref }}"
          FEATURE=$(echo "$BRANCH" | sed 's|^feature/||')
          SPEC_PATH=".specs/$FEATURE/spec.md"

          if [ -f "$SPEC_PATH" ]; then
            echo "spec_path=$SPEC_PATH" >> $GITHUB_OUTPUT
            echo "feature=$FEATURE" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            # Fallback til senest ændrede spec
            LATEST=$(find .specs -name "spec.md" \
              ! -path "*/_templates/*" \
              ! -path "*/example/*" \
              -newer .git/index \
              2>/dev/null | head -1)

            if [ -n "$LATEST" ]; then
              FEATURE=$(echo "$LATEST" | sed 's|.specs/||' | sed 's|/spec.md||')
              echo "spec_path=$LATEST" >> $GITHUB_OUTPUT
              echo "feature=$FEATURE" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Extract acceptance criteria
        if: steps.find-spec.outputs.found == 'true'
        id: extract
        shell: bash
        run: |
          SPEC="${{ steps.find-spec.outputs.spec_path }}"

          # Udtræk Intent (første afsnit efter ## Intent)
          INTENT=$(awk '/^## Intent/{found=1; next} found && /^##/{exit} found && NF{print; found=2}' "$SPEC" | head -3)

          # Udtræk Acceptance Criteria-linjer
          CRITERIA=$(awk '/^## Acceptance Criteria/{found=1; next} found && /^##/{exit} found && /^- \[/{print}' "$SPEC")

          # Gem til fil for at undgå shell-escaping problemer
          echo "$INTENT" > /tmp/intent.txt
          echo "$CRITERIA" > /tmp/criteria.txt

      - name: Post or update PR comment
        if: steps.find-spec.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const feature = '${{ steps.find-spec.outputs.feature }}';
            const specPath = '${{ steps.find-spec.outputs.spec_path }}';

            let intent = '';
            let criteria = '';
            try {
              intent = fs.readFileSync('/tmp/intent.txt', 'utf8').trim();
              criteria = fs.readFileSync('/tmp/criteria.txt', 'utf8').trim();
            } catch (e) {
              core.warning('Kunne ikke læse spec-indhold: ' + e.message);
              return;
            }

            const criteriaLines = criteria
              ? criteria.split('\n').filter(l => l.trim()).join('\n')
              : '_Ingen acceptance criteria fundet — tjek spec.md_';

            const body = [
              '## 📋 Spec-oversigt: `' + feature + '`',
              '',
              '> Auto-genereret fra `' + specPath + '`',
              '',
              '### Intent',
              intent || '_Ikke udfyldt_',
              '',
              '### Acceptance Criteria',
              '> Verificér hvert punkt inden merge — kør `/review-spec` og paste output i PR-beskrivelsen.',
              '',
              criteriaLines,
              '',
              '---',
              '_Opdateres automatisk når du pusher til denne branch._',
            ].join('\n');

            const marker = '<!-- spec-summary-bot -->';
            const fullBody = marker + '\n' + body;

            // Find eksisterende kommentar fra denne bot
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
